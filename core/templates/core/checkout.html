<!doctype html>
<html>
  <head><meta charset="utf-8"><title>Checkout</title></head>
  <body>
    <h1>Review your cart</h1>
    <ul>
      {% for it in items %}
        <li>{{ it.product.title }} × {{ it.quantity }} — {{ it.product.price }}</li>
      {% endfor %}
    </ul>

    <!-- Total here is informational; Stripe calculates actual payment from line_items -->
    <p><strong>Total (approx):</strong> {{ total_minor|floatformat:-2 }} {{ currency|upper }}</p>

    <!-- Button posts to start_checkout (required) -->
    <form action="{% url 'core:start-checkout' cart.id %}" method="post">
      {% csrf_token %}
      <button type="submit">Pay with Stripe (Test)</button>
    </form>
  </body>
</html>
